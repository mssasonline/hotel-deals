name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Job 1: Type check + lint (fast, always runs) ─────────────────────────────
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ── Job 2: Playwright E2E (runs after check, requires secrets) ───────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: check
    # Skip silently if Supabase vars are not configured in this repo
    if: vars.NEXT_PUBLIC_SUPABASE_URL != ''
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NOTIFICATIONS_ENABLED: "false"
      # Test credentials (GitHub → Settings → Secrets)
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
      TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      TEST_PARTNER_EMAIL: ${{ secrets.TEST_PARTNER_EMAIL }}
      TEST_PARTNER_PASSWORD: ${{ secrets.TEST_PARTNER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
